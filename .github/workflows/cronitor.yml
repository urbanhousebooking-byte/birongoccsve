name: Cronitor Relay

on:
  workflow_run:
    workflows: ["*"]
    types: [requested, completed]

jobs:
  send-telemetry:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar a Cronitor
        uses: cronitor/monitor-github-actions@v7
        with:
          event: ${{ secrets.GITHUB_TOKEN }}
          cronitor_key: ${{ secrets.CRONITOR_API_KEY }}
